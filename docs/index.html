<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Inference Bank Protocol</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #fff;
            color: #000;
            font-family: 'Lora', serif;
            font-size: 2.5rem;
        }

        body {
            position: relative;
        }

        .content {
            position: absolute;
            top: 38.2%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 1.3;
        }

        .protocol {
            font-style: italic;
            color: #444;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="content">
        <div>The Inference<br>Bank <span class="protocol">Protocol</span></div>
        <div class="subtitle">Banking for agents.</div>
    </div>
</body>
</html>
